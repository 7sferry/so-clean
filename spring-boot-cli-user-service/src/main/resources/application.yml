spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/so_clean
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  shell:
    interactive:
      enabled: true

logging:
  level:
    org.jooq: WARN
